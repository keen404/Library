<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="./script.js" defer></script>
    <title>Document</title>
</head>

<body>
    <table id="display-data"></table>
    <dialog id="dialog">
        <form>
            <p>
                <label for="book-title">Title</label>
                <input type="text" id="book-title" />
                <label for="book-author">Author</label>
                <input type="text" id="book-author" />
                <label for="book-pages">Pages</label>
                <input type="text" id="book-pages" />
                <label for="book-price">Price</label>
                <input type="text" id="book-price" />
            </p>
            <div>
                <button id="cancle-add" formmethod="dialog">Cancle</button>
                <button id="confirm-add">Add</button>
            </div>
        </form>
    </dialog>
    <p>
        <button id="active-dialog">Add Book</button>
    </p>
</body>

</html>
